name: moltrans # 你可以修改这里的环境名称
channels:
  - pytorch
  - nvidia # 如果需要 GPU 支持
  - conda-forge
  - defaults
dependencies:
  - python=3.10 # 建议指定一个 Python 版本
  - numpy 需要使用<2.0的
  - pandas
  - tqdm
  - scikit-learn
  - pytorch # 会根据你的系统自动安装 CPU 或 GPU 版本
  - torchvision # 通常与 torch 搭配使用
  - pip
  - pip:
      - subword-nmt
